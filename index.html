<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<meta name="apple-mobile-web-app-title" content="今晚吃命" />

<title>今晚吃命</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Noto+Serif+TC:wght@600;700;800;900&family=Baloo+2:wght@500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #18161f;
    background-image: radial-gradient(120% 90% at 50% 0%, #26222e 0%, #18161f 60%, #0f0e14 100%);
    font-family: 'Noto Sans TC', system-ui, sans-serif;
    display: grid; place-items: center; overflow: hidden;
  }
  #stage { position: fixed; inset: 0; display: grid; place-items: center; }
  #phone-wrap {
    width: 100vw; height: 100dvh; flex-shrink: 0;
    border-radius: 0; padding: 0; background: transparent;
    box-shadow: none;
    overflow: hidden; position: relative;
  }
  #root { width: 100%; height: 100%; border-radius: 0; overflow: hidden; }
  .app-preview-chrome { display: none !important; }
  @media (min-width: 640px) {
    #phone-wrap {
      width: 390px; height: 844px;
      border-radius: 54px; background: #000;
      box-shadow: 0 0 0 12px #1b1b1f, 0 0 0 14px #2c2c30, 0 40px 90px -20px rgba(0,0,0,.7);
    }
    #root { border-radius: 42px; }
    .app-preview-chrome.status { display: flex !important; }
    .app-preview-chrome.home { display: grid !important; }
  }

  input[type=range].radslider {
    -webkit-appearance: none; appearance: none; height: 6px; border-radius: 99px;
    background: var(--surface-2); outline: none; cursor: pointer;
  }
  input[type=range].radslider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); border: 3px solid var(--surface); box-shadow: var(--shadow); cursor: pointer;
  }
  input[type=range].radslider::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%; background: var(--accent);
    border: 3px solid var(--surface); box-shadow: var(--shadow); cursor: pointer;
  }
  input[type=date].radslider, input[type=date] { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-6deg); } 50% { transform: translateY(-12px) rotate(6deg); } }
  .bigdice { animation: bob 2.4s ease-in-out infinite; display: inline-block; }
  @keyframes slotspin { from { transform: translateY(0); } to { transform: translateY(-1856px); } }
  @keyframes cardIn { from { transform: translateY(16px) scale(.96); } to { transform: none; } }
  @keyframes dealIn { from { opacity: 0; transform: translateY(-130px) scale(.7) rotate(-12deg); } to { opacity: 1; transform: translateY(0) scale(1) rotate(0); } }
  @keyframes flipReveal { 0% { transform: perspective(900px) rotateY(0deg); } 50% { transform: perspective(900px) rotateY(90deg); } 100% { transform: perspective(900px) rotateY(0deg); } }
  .flip-spin { animation: flipReveal .52s cubic-bezier(.45,.05,.3,1) both; }
  @keyframes deckBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  .deal-card { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    .deal-card { animation: cardIn .45s cubic-bezier(.2,.9,.3,1.3); }
  }
  /* 3D 骰子 */
  .dice3d-scene { width: 120px; height: 120px; perspective: 720px; display: grid; place-items: center; }
  .dice3d { width: 104px; height: 104px; position: relative; transform-style: preserve-3d; transform: rotateX(-22deg) rotateY(28deg); }
  .dice3d.resting { animation: diceFloat 3s ease-in-out infinite; }
  .dice3d.rolling { animation: diceTumble 1.3s cubic-bezier(.2,.65,.3,1) forwards; }
  .dice3d .face { position: absolute; width: 104px; height: 104px; border-radius: 22px; display: grid; place-items: center; font-size: 48px; background: var(--surface); border: 2px solid var(--line); box-shadow: inset 0 -6px 14px rgba(0,0,0,.06); }
  .face-front  { transform: translateZ(52px); }
  .face-back   { transform: rotateY(180deg) translateZ(52px); }
  .face-right  { transform: rotateY(90deg) translateZ(52px); }
  .face-left   { transform: rotateY(-90deg) translateZ(52px); }
  .face-top    { transform: rotateX(90deg) translateZ(52px); }
  .face-bottom { transform: rotateX(-90deg) translateZ(52px); }
  @keyframes diceFloat { 0%,100% { transform: rotateX(-22deg) rotateY(28deg) translateY(0); } 50% { transform: rotateX(-22deg) rotateY(28deg) translateY(-10px); } }
  @keyframes diceTumble { 0% { transform: rotateX(-22deg) rotateY(28deg); } 100% { transform: rotateX(742deg) rotateY(1108deg); } }
  @keyframes revealUp { from { transform: translateY(14px) scale(.98); } to { transform: none; } }
  .reveal-up { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) { .reveal-up { animation: revealUp .42s cubic-bezier(.2,.8,.3,1); } }
  .hscroll { scrollbar-width: none; -ms-overflow-style: none; }
  .hscroll::-webkit-scrollbar { display: none; }
</style>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#E8853B"/>
    <g transform="translate(50 50)">
      <rect x="-19" y="-19" width="38" height="38" rx="9" fill="#fff" transform="rotate(-8)"/>
      <circle cx="-7" cy="-7" r="3.4" fill="#3A2A1E"/><circle cx="7" cy="7" r="3.4" fill="#3A2A1E"/>
      <circle cx="7" cy="-7" r="3.4" fill="#3A2A1E"/><circle cx="-7" cy="7" r="3.4" fill="#3A2A1E"/>
      <circle cx="0" cy="0" r="3.4" fill="#3A2A1E"/>
    </g>
  </svg>
</template>
</head>
<body>
<div id="stage">
  <div id="phone-wrap"><div id="root"></div></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
  function mount() {
    if (!window.DinnerApp) { setTimeout(mount, 40); return; }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(window.DinnerApp));
  }
  mount();

  function fit() {
    const wrap = document.getElementById('phone-wrap');
    if (window.innerWidth < 640) {
      wrap.style.transform = 'none';
      return;
    }
    const pad = 24;
    const s = Math.min((window.innerWidth - pad) / 390, (window.innerHeight - pad) / 844, 1);
    wrap.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  fit();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function (e) {
        console.log('SW 未註冊（多半是用 file:// 開啟，改用本機伺服器即可離線）', e && e.message);
      });
    });
  }
</script>
